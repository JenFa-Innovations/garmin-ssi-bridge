<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1f"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0044cc"/>
      <stop offset="100%" style="stop-color:#0077ff"/>
    </linearGradient>
    <linearGradient id="qrgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00aaff"/>
      <stop offset="100%" style="stop-color:#0055ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4488ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="80" y1="0" x2="80" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
    <line x1="240" y1="0" x2="240" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
  </g>

  <!-- Icon: Round display with QR -->
  <circle cx="76" cy="80" r="52" fill="#0a1a2e" stroke="#0044aa" stroke-width="1.5"/>
  <circle cx="76" cy="80" r="44" fill="#0d2040" opacity="0.6"/>

  <!-- Mini QR pattern inside circle -->
  <g fill="url(#qrgrad)" filter="url(#glow)">
    <!-- Finder top-left -->
    <rect x="52" y="56" width="18" height="18" rx="2"/>
    <rect x="55" y="59" width="12" height="12" rx="1" fill="#0a1a2e"/>
    <rect x="57" y="61" width="8" height="8" rx="1" fill="url(#qrgrad)"/>
    <!-- Finder top-right -->
    <rect x="86" y="56" width="18" height="18" rx="2"/>
    <rect x="89" y="59" width="12" height="12" rx="1" fill="#0a1a2e"/>
    <rect x="91" y="61" width="8" height="8" rx="1" fill="url(#qrgrad)"/>
    <!-- Finder bottom-left -->
    <rect x="52" y="90" width="18" height="18" rx="2"/>
    <rect x="55" y="93" width="12" height="12" rx="1" fill="#0a1a2e"/>
    <rect x="57" y="95" width="8" height="8" rx="1" fill="url(#qrgrad)"/>
    <!-- Data dots -->
    <rect x="86" y="90" width="4" height="4" rx="0.5"/>
    <rect x="92" y="90" width="4" height="4" rx="0.5"/>
    <rect x="98" y="90" width="4" height="4" rx="0.5"/>
    <rect x="86" y="96" width="4" height="4" rx="0.5"/>
    <rect x="98" y="96" width="4" height="4" rx="0.5"/>
    <rect x="92" y="102" width="4" height="4" rx="0.5"/>
    <rect x="86" y="102" width="4" height="4" rx="0.5"/>
    <rect x="98" y="102" width="4" height="4" rx="0.5"/>
  </g>

  <!-- Arrow bridge in the middle -->
  <g transform="translate(148, 72)" filter="url(#glow)">
    <line x1="0" y1="8" x2="28" y2="8" stroke="#0066ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="0" y2="16" stroke="#0066ff" stroke-width="2" stroke-linecap="round"/>
    <polyline points="20,2 28,8 20,14" fill="none" stroke="#0066ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="200" y="72" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="36" font-weight="700" letter-spacing="-1"
        fill="#f0f4ff">garmin</text>
  <text x="200" y="72" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="36" font-weight="700" letter-spacing="-1"
        fill="url(#blue)" dx="108">-ssi</text>
  <text x="200" y="106" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="36" font-weight="700" letter-spacing="-1"
        fill="url(#blue)">bridge</text>

  <!-- Tagline -->
  <text x="202" y="130" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="12" fill="#334466" letter-spacing="0.5">
    One tap. Dive logged.
  </text>

  <!-- Version / tag -->
  <rect x="386" y="18" width="72" height="20" rx="4" fill="#001133"/>
  <text x="422" y="32" font-family="monospace" font-size="10" fill="#0066ff"
        text-anchor="middle" letter-spacing="1">v1.0.0</text>
</svg>
